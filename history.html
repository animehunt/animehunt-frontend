<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch History – AnimeHunt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<style>
body{
  background:#0b0f1a;
  color:#fff;
  font-family:system-ui;
}

/* SECTION */
.section{
  padding:16px;
}

.section h2{
  font-size:18px;
  margin-bottom:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  aspect-ratio:2/3;
  background:#1a1f2e;
  border-radius:10px;
  padding:8px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  font-size:11px;
  cursor:pointer;
}

/* BUTTONS */
.actions{
  padding:16px;
  display:flex;
  justify-content:flex-end;
}

.clear-btn{
  background:#ff4c4c;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:#fff;
  font-size:12px;
}
</style>
</head>

<body data-page="history">

<header class="main-header">
  <div class="menu-btn">☰</div>
  <div class="logo">
    <span class="anime">anime</span><span class="hunt">hunt</span>
  </div>
</header>

<!-- CONTINUE WATCHING -->
<section class="section">
  <h2>Continue Watching</h2>
  <div class="grid" id="continueGrid"></div>
</section>

<!-- HISTORY -->
<section class="section">
  <h2>Watch History</h2>
  <div class="grid" id="historyGrid"></div>
</section>

<div class="actions">
  <button class="clear-btn" id="clearHistory">Clear History</button>
</div>

<script type="module" src="js/features/historyPage.js"></script>
</body>
</html>
