HEADER START
=================================================== -->

  <div class="menu-btn">☰</div>

  <div class="logo">
    <span class="anime">anime</span><span class="hunt">hunt</span>
  </div>

  <input
    type="text"
    class="search-bar"
    placeholder="Search movie"
  />
</header>
<!-- HEADER END -->


<!-- ===================================================
SIDEBAR MENU START
=================================================== -->
<aside class="sidebar">
  <div class="close-btn">✕</div>

  </nav>
</aside>
<div class="overlay"></div>
<!-- SIDEBAR MENU END -->


<!-- ===================================================
HERO BANNER START
=================================================== -->
<section class="hero-banner" id="homeHeroBanner">

  <div class="hero-content">
    <h1 class="hero-title">RAYA AND <br> THE LAST <br> DRAGON</h1>

    <div class="hero-meta">
      <span>2021</span>
      <span>⭐ 8.0</span>
    </div>

    <button class="play-btn">PLAY</button>
  </div>

</section>
<!-- HERO BANNER END -->


<!-- ===================================================
CATEGORY FILTER BAR START
=================================================== -->
<section class="category-bar"></section>
<!-- CATEGORY FILTER BAR END -->

<!-- FILTER GRID (HIDDEN BY DEFAULT) -->
<section class="home-grid"></section>
  
<!-- CONTINUE WATCHING ROW -->
<section class="movie-row" id="continueSection" style="display:none;">
  
  <div class="row-header">
    <h2>Continue Watching</h2>
    <button id="clearContinueBtn" style="
      background:none;
      border:none;
      color:#ff4c4c;
      font-size:14px;
      cursor:pointer;
    ">🗑</button>
  </div>

  <div class="movie-scroll" id="continueScroll"></div>

</section>

<!-- DYNAMIC HOMEPAGE ROWS -->
<section id="homepageRows"></section>

=================================================== -->
